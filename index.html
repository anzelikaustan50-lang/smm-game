<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Digital Studio Pro</title>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

<script src="https://cdn.tailwindcss.com"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#07070f;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden}
#root{height:100vh;display:flex;flex-direction:column}

/* ── MOBILE RESPONSIVE ───────────────────────────── */
@media(max-width:768px){
  body{overflow:auto;height:auto}
  #root{height:auto;min-height:100svh}
  .hud{flex-wrap:wrap;gap:6px;padding:8px 10px}
  .hud-stat{padding:3px 7px;font-size:11px}
  .hud-hide-mobile{display:none !important}
  .hud-nav{order:10;width:100%;display:flex;gap:5px;justify-content:center;border-top:1px solid rgba(255,255,255,.06);padding-top:6px;margin-top:2px}
  .office-grid{grid-template-columns:repeat(2,1fr) !important;gap:10px !important}
  .office-zone{padding:14px;border-radius:14px}
  .zone-desc-text{display:none !important}
  .exam-banner-span{grid-column:span 2 !important}
  .chat-sidebar{width:100% !important;border-right:none !important;border-bottom:1px solid rgba(255,255,255,.07) !important;flex-direction:row !important;overflow-x:auto !important;flex-shrink:0 !important;max-height:72px !important;min-height:72px !important}
  .chat-outer{flex-direction:column !important}
  .chat-msg{max-width:92% !important;font-size:13px !important}
  .write-layout{flex-direction:column !important}
  .write-rubric{width:100% !important;border-left:none !important;border-top:1px solid rgba(255,255,255,.07) !important;max-height:none !important}
  .video-outer{flex-direction:column !important}
  .video-shelf{width:100% !important;border-right:none !important;border-bottom:1px solid rgba(255,255,255,.07) !important;max-height:160px !important;flex-direction:row !important;flex-wrap:wrap !important;overflow-x:auto !important}
  .task-two-col{grid-template-columns:1fr !important}
  .game-textarea,.game-input{font-size:16px !important}
  .btn{font-size:12px;padding:7px 12px}
  .cert-inner{padding:22px 16px !important}
  .cert-skills-grid{grid-template-columns:1fr !important}
  .cert-grade-row{flex-direction:column !important;align-items:flex-start !important}
}
@media(max-width:420px){
  .office-grid{grid-template-columns:1fr !important}
  .exam-banner-span{grid-column:span 1 !important}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.5);border-radius:2px}

@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes glow{0%,100%{box-shadow:0 0 12px #7c3aed30}50%{box-shadow:0 0 28px #7c3aed70}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:0}50%{opacity:1}}
@keyframes slideRight{from{transform:translateX(110%)}to{transform:translateX(0)}}
@keyframes confetti{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(80px) rotate(720deg);opacity:0}}
@keyframes xpPop{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-40px);opacity:0}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes chartBars{from{transform:scaleY(0)}to{transform:scaleY(1)}}

.slide-up{animation:slideUp .35s ease both}
.fade-in{animation:fadeIn .3s ease both}
.pop-in{animation:pop .4s ease both}
.float-anim{animation:float 3s ease-in-out infinite}
.glow-anim{animation:glow 2s ease-in-out infinite}
.pulse-anim{animation:pulse 1.2s ease-in-out infinite}
.spin-anim{animation:spin .9s linear infinite}

.glass{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(12px)}
.glass-dark{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.06)}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px}

.btn{padding:9px 18px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(124,58,237,.5)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{background:rgba(255,255,255,.07);color:#cbd5e1;border:1px solid rgba(255,255,255,.11)}
.btn-secondary:hover{background:rgba(255,255,255,.12);color:#fff}
.btn-danger{background:rgba(220,38,38,.18);color:#fca5a5;border:1px solid rgba(220,38,38,.3)}
.btn-danger:hover{background:rgba(220,38,38,.28)}
.btn-success{background:rgba(16,185,129,.18);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}
.btn-success:hover{background:rgba(16,185,129,.28)}

.hud{background:rgba(7,7,15,.96);border-bottom:1px solid rgba(124,58,237,.18);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:50}
.hud-stat{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);font-size:12px;font-weight:600}

.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .2s;color:#4b5563;font-size:13px;font-weight:500;border:1px solid transparent;position:relative}
.nav-item:hover{background:rgba(255,255,255,.05);color:#94a3b8}
.nav-item.active{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.3);color:#a78bfa}
.nav-badge{margin-left:auto;background:#7c3aed;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700}

.office-zone{border-radius:18px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);cursor:pointer;transition:all .25s;position:relative;overflow:hidden;padding:20px}
.office-zone:hover{border-color:rgba(124,58,237,.4);background:rgba(124,58,237,.07);transform:translateY(-3px);box-shadow:0 10px 32px rgba(124,58,237,.15)}
.office-zone.has-task{border-color:rgba(251,191,36,.35);box-shadow:0 0 18px rgba(251,191,36,.08)}
.task-dot{position:absolute;top:12px;right:12px;width:9px;height:9px;background:#fbbf24;border-radius:50%;animation:pulse 1s infinite}

.chat-msg{max-width:75%;padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.55;animation:slideUp .3s ease both}
.chat-from-client{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-bottom-left-radius:4px;color:#e2e8f0}
.chat-from-me{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border-bottom-right-radius:4px;margin-left:auto}
.chat-option{border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:11px 15px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.03);font-size:13px;text-align:left;color:#cbd5e1;width:100%}
.chat-option:hover{border-color:rgba(124,58,237,.5);background:rgba(124,58,237,.1);color:#fff}
.chat-option.sel{border-color:#7c3aed;background:rgba(124,58,237,.15);color:#fff}

.clip-card{border-radius:10px;cursor:grab;transition:all .2s;user-select:none;position:relative;padding:10px;border:2px solid transparent}
.clip-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
.clip-card.dragging-src{opacity:.35;cursor:grabbing}
.clip-card.banned{border-color:rgba(220,38,38,.5) !important}
.timeline-drop{background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.12);border-radius:10px;min-height:70px;transition:all .2s;position:relative;display:flex;flex-wrap:wrap;align-items:center;gap:4px;padding:6px}
.timeline-drop.over{border-color:#7c3aed;background:rgba(124,58,237,.08)}
.tl-clip{border-radius:8px;padding:4px 8px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;height:54px;flex-direction:column;justify-content:center;text-align:center}
.tl-clip:hover{filter:brightness(1.2)}
.tl-clip.sel-clip{outline:2px solid #fff;outline-offset:1px}

.monitor{background:#000;border-radius:12px;border:3px solid #1e293b;aspect-ratio:16/9;overflow:hidden;position:relative;box-shadow:0 0 0 1px #334155,0 20px 50px rgba(0,0,0,.5)}

.metric-card{border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);cursor:pointer;transition:all .2s}
.metric-card:hover{border-color:rgba(124,58,237,.3)}
.metric-card.sel-metric{border-color:#7c3aed;background:rgba(124,58,237,.1)}
.metric-card.problem{border-color:rgba(220,38,38,.25);background:rgba(220,38,38,.04)}
.metric-card.problem.sel-metric{border-color:#ef4444;background:rgba(239,68,68,.12);box-shadow:0 0 18px rgba(239,68,68,.2)}
.metric-card.good{border-color:rgba(16,185,129,.2)}

.ai-dot{width:7px;height:7px;border-radius:50%;background:#7c3aed;animation:pulse 1.2s infinite}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}
.ai-output{border:1px solid rgba(124,58,237,.2);background:rgba(124,58,237,.04);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;animation:slideUp .35s ease both}
.ai-output:hover{border-color:rgba(124,58,237,.45);background:rgba(124,58,237,.09)}
.ai-output.sel-output{border-color:#7c3aed;background:rgba(124,58,237,.14);box-shadow:0 0 18px rgba(124,58,237,.18)}

.game-input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;padding:9px 13px;font-size:13px;transition:border-color .2s;outline:none;width:100%;font-family:inherit}
.game-input:focus{border-color:rgba(124,58,237,.5)}
.game-textarea{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;padding:11px 13px;font-size:13px;transition:border-color .2s;outline:none;width:100%;resize:none;font-family:inherit}
.game-textarea:focus{border-color:rgba(124,58,237,.5)}

.notif{position:fixed;bottom:20px;right:20px;z-index:9999;min-width:270px;max-width:340px;background:rgba(12,12,24,.97);border:1px solid rgba(124,58,237,.28);border-radius:14px;padding:13px 16px;animation:slideRight .4s ease;backdrop-filter:blur(16px);box-shadow:0 10px 40px rgba(0,0,0,.5)}

.xp-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden}
.xp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#7c3aed,#a78bfa);transition:width .7s ease}

.cal-day{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:10px;min-height:90px;padding:7px;transition:all .2s}
.cal-day.over{border-color:#7c3aed;background:rgba(124,58,237,.08)}
.cal-post{border-radius:7px;padding:5px 8px;font-size:11px;margin-top:4px;cursor:grab;user-select:none;transition:all .15s;border:1px solid transparent}
.cal-post:hover{transform:scale(1.03)}

.prompt-opt{border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.03);text-align:left;color:#94a3b8;font-size:13px;width:100%}
.prompt-opt:hover{border-color:rgba(124,58,237,.4);background:rgba(124,58,237,.08);color:#c4b5fd}
.prompt-opt.sel-prompt{border-color:#7c3aed;background:rgba(124,58,237,.14);color:#a78bfa}

.scroll-y{overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(124,58,237,.3) transparent}
</style>
</head>
<body>
<div id="root"></div>

    const fn=()=>setMob(window.innerWidth<=768);
    window.addEventListener('resize',fn);
    return()=>window.removeEventListener('resize',fn);
  },[]);
  return mob;
};

// ─── UTILITIES ───────────────────────────────────────────────────
const getLvl=(xp)=>LEVELS.slice().reverse().find(l=>xp>=(l.next===99999?0:LEVELS[l.lvl-2]?.next||0))||LEVELS[0];
const getNextLvl=(xp)=>LEVELS.find(l=>xp<l.next)||LEVELS[LEVELS.length-1];
const fmtMoney=(n)=>'₽'+n.toLocaleString('ru-RU');

// ─── AI EVALUATOR ─────────────────────────────────────────────────
// Evaluates free-text player response against keyword topic groups.
// Each group is an array of synonyms — ONE hit = group covered.
const evalResponse=(text,evalKeys={})=>{
  const lower=text.toLowerCase();
  const scoreGroup=(groups)=>{
    if(!groups||groups.length===0)return 5;
    const hits=groups.filter(g=>g.some(w=>lower.includes(w))).length;
    return Math.min(10,Math.round((hits/groups.length)*10));
  };
  return{
    confidence:scoreGroup(evalKeys.confidence),
    expertise:scoreGroup(evalKeys.expertise),
    sales:scoreGroup(evalKeys.sales),
    objections:scoreGroup(evalKeys.objections),
  };
};
const DIM_LABELS={confidence:'Уверенность',expertise:'Экспертность',sales:'Продажи',objections:'Возражения'};
const DIM_ICONS={confidence:'💪',expertise:'🎓',sales:'💼',objections:'🛡️'};
const getDimFeedback=(dim,score)=>{
  const fb={
    confidence:{
      high:'Говоришь уверенно — клиент чувствует профессионала',
      mid:'Немного больше уверенности: называй конкретные цифры и сроки',
      low:'Ответ звучит неуверенно. Клиент может усомниться в экспертизе'
    },
    expertise:{
      high:'Используешь профессиональные термины и данные — это впечатляет',
      mid:'Добавь конкретные инструменты, метрики или алгоритмы',
      low:'Нет специфики — ответ выглядит поверхностным'
    },
    sales:{
      high:'Предлагаешь конкретное решение и берёшь инициативу — продаёшь экспертизу',
      mid:'Можно чётче предложить следующий шаг и ценность',
      low:'Не предложил решение — упустил возможность убедить клиента'
    },
    objections:{
      high:'Отлично работаешь с возражением — аргументируешь, не соглашаешься вслепую',
      mid:'Попробуй аргументировать точнее: данные, кейсы, логика',
      low:'Возражение не отработано — клиент остался неубеждённым'
    }
  };
  const level=score>=7?'high':score>=4?'mid':'low';
  return{text:fb[dim][level],level};
};

// Evaluate a written task (content plan, strategy, etc.)
const evalWriteTask=(text,rubric)=>{
  const lower=text.toLowerCase();
  return rubric.map(r=>({
    ...r,
    hit:r.keywords.some(k=>lower.includes(k)),
  }));
};

// ─── NOTIFICATIONS ───────────────────────────────────────────────
const NotifCtx=React.createContext(null);
const NotifProvider=({children})=>{
  const [notifs,setNotifs]=useState([]);
  const push=useCallback((msg,type='info',icon='💡')=>{
    const id=Date.now()+Math.random();
    setNotifs(n=>[...n,{id,msg,type,icon}]);
    setTimeout(()=>setNotifs(n=>n.filter(x=>x.id!==id)),4000);
  },[]);
  return(
    <NotifCtx.Provider value={push}>
      {children}
      <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:10}}>
        {notifs.map(n=>(
          <div key={n.id} className="notif slide-up">
            <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
              <span style={{fontSize:22}}>{n.icon}</span>
              <div>
                <div style={{fontSize:13,color:'#e2e8f0',lineHeight:1.5}}>{n.msg}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </NotifCtx.Provider>
  );
};
const useNotif=()=>React.useContext(NotifCtx);

  const xpCur=gs.xp-(LEVELS[gs.level-2]?.next||0);
  const xpNeeded=nextLvl.next-(LEVELS[gs.level-2]?.next||0);
  const pct=Math.min(100,Math.round(xpCur/xpNeeded*100));

const ChatScreen=({tasks,onComplete,onBack,onFlag,examClients})=>{
  const mob=useIsMobile();
  const [activeClient,setActiveClient]=useState(tasks[0]?.clientId||null);
  const [taskStates,setTaskStates]=useState({});
  const [draft,setDraft]=useState('');
  const [evaluating,setEvaluating]=useState(false);
  const notify=useNotif();
  const messagesEndRef=useRef(null);
  const textareaRef=useRef(null);

  const activeTask=tasks.find(t=>t.clientId===activeClient&&t.type==='chat');
  const ts=taskStates[activeClient]||{step:0,msgs:[],totalScore:0,scoreCount:0,done:false};

  useEffect(()=>{
    if(activeTask&&!taskStates[activeClient]){
      const scene=activeTask.data.scenes[0];
      setTaskStates(prev=>({...prev,[activeClient]:{
        step:0,msgs:[{from:'client',text:scene.msg,scene}],totalScore:0,scoreCount:0,done:false
      }}));
    }
  },[activeClient,activeTask]);

  useEffect(()=>{messagesEndRef.current?.scrollIntoView({behavior:'smooth'})},[taskStates,evaluating]);

  const sendMessage=()=>{
    if(!activeTask||ts.done||evaluating)return;
    const text=draft.trim();
    if(text.length<15){notify('Напиши хотя бы несколько слов!','info','✏️');return;}
    setDraft('');setEvaluating(true);
    const step=ts.step;
    const scene=activeTask.data.scenes[step];

    setTimeout(()=>{
      const evalResult=evalResponse(text,scene.evalKeys||{});
      const avg=Math.round((evalResult.confidence+evalResult.expertise+evalResult.sales+evalResult.objections)/4);
      const newMsgs=[
        ...ts.msgs,
        {from:'me',text},
        {from:'ai_eval',evalResult,scene,avg}
      ];
      const newTotalScore=ts.totalScore+avg;
      const newScoreCount=ts.scoreCount+1;
      const nextStep=step+1;
      const scenes=activeTask.data.scenes;

      if(nextStep<scenes.length){
        setTimeout(()=>{
          const nextScene=scenes[nextStep];
          setTaskStates(prev=>({...prev,[activeClient]:{
            step:nextStep,
            msgs:[...newMsgs,{from:'client',text:nextScene.msg,scene:nextScene}],
            totalScore:newTotalScore,scoreCount:newScoreCount,done:false
          }}));
          setEvaluating(false);
        },900);
      } else {
        setTaskStates(prev=>({...prev,[activeClient]:{
          step:nextStep,msgs:newMsgs,totalScore:newTotalScore,scoreCount:newScoreCount,done:true
        }}));
        setEvaluating(false);
        const finalAvg=Math.round(newTotalScore/newScoreCount);
        const quality=finalAvg/10;
        // store flag for consequences
        if(activeTask.consequenceFlag&&onFlag){
          onFlag(activeTask.consequenceFlag,finalAvg);
        }
        setTimeout(()=>{
          notify(`Диалог завершён! Средняя оценка: ${finalAvg}/10 · +${Math.round(activeTask.reward.xp*quality)} XP`,'success','💬');
          onComplete(activeTask,quality);
        },1200);
      }
    },1400);
  };

  const currentScene=activeTask&&!ts.done&&!evaluating?activeTask.data.scenes[ts.step]:null;
  const allClients=[...CLIENTS,...(examClients||[])];
  const client=allClients.find(c=>c.id===activeClient);

  const handleKey=(e)=>{
    if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){sendMessage();}
  };

  return(
    <div style={{flex:1,display:'flex',flexDirection:mob?'column':'row',overflow:'hidden'}}>
      {/* Sidebar — vertical on desktop, horizontal tabs on mobile */}
      <div style={{
        ...(mob
          ? {display:'flex',flexDirection:'row',overflowX:'auto',borderBottom:'1px solid rgba(255,255,255,.07)',flexShrink:0,background:'rgba(0,0,0,.2)'}
          : {width:220,borderRight:'1px solid rgba(255,255,255,.07)',display:'flex',flexDirection:'column',flexShrink:0}
        )
      }}>
        {!mob&&<div style={{padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,.07)',flexShrink:0}}>
          <div style={{fontSize:13,fontWeight:700,color:'#fff'}}>💬 Мессенджер</div>
          <div style={{fontSize:11,color:'#4b5563',marginTop:1}}>Пишешь сам — AI оценит</div>
        </div>}
        <div style={{...(mob?{display:'flex',flexDirection:'row'}:{flex:1,overflowY:'auto'})}}>
          {allClients.filter(c=>tasks.some(t=>t.clientId===c.id)).map(c=>{
            const hasTask=tasks.find(t=>t.clientId===c.id&&t.type==='chat');
            return(

            {/* messages */}

                    <div className="ai-dot"/><div className="ai-dot"/><div className="ai-dot"/>

// ─── VIDEO EDITOR ────────────────────────────────────────────────
const VideoEditor=({task,onComplete,onBack})=>{
  const mob=useIsMobile();
  const [shelf,setShelf]=useState([...task.data.clips]);
  const [timeline,setTimeline]=useState([]);
  const [selId,setSelId]=useState(null);
  const [draggingId,setDraggingId]=useState(null);
  const [dragSource,setDragSource]=useState(null);
  const [dropping,setDropping]=useState(false);
  const [preview,setPreview]=useState(false);
  const [previewIdx,setPreviewIdx]=useState(0);
  const [title,setTitle]=useState('');
  const [result,setResult]=useState(null);
  const notify=useNotif();
  const previewTimer=useRef(null);

  const totalDur=timeline.reduce((s,c)=>s+c.dur,0);

  const startDragShelf=(e,clip)=>{
    setDraggingId(clip.id);setDragSource('shelf');
    e.dataTransfer.effectAllowed='move';
  };
  const startDragTl=(e,clip)=>{
    setDraggingId(clip.id);setDragSource('timeline');
    e.dataTransfer.effectAllowed='move';
  };
  const onDropTl=(e)=>{
    e.preventDefault();setDropping(false);
    if(!draggingId)return;
    if(dragSource==='shelf'){
      const clip=shelf.find(c=>c.id===draggingId);
      if(clip){setTimeline(t=>[...t,clip]);setShelf(s=>s.filter(c=>c.id!==draggingId));}
    }
    setDraggingId(null);setDragSource(null);
  };
  const removeFromTl=(id)=>{
    const clip=timeline.find(c=>c.id===id);
    if(clip){setTimeline(t=>t.filter(c=>c.id!==id));setShelf(s=>[...s,clip]);if(selId===id)setSelId(null);}
  };

  const startPreview=()=>{
    if(timeline.length===0)return;
    setPreview(true);setPreviewIdx(0);
    let i=0;
    const next=()=>{
      i++;
      if(i<timeline.length){setPreviewIdx(i);previewTimer.current=setTimeout(next,timeline[i].dur*300);}
      else{setPreview(false);setPreviewIdx(0);}
    };
    previewTimer.current=setTimeout(next,timeline[0].dur*300);
  };
  useEffect(()=>()=>{clearTimeout(previewTimer.current)},[]);

  const evaluate=()=>{
    const d=task.data;
    const checks={
      noBad:!timeline.some(c=>!c.ok),
      hasCTA:timeline.some(c=>c.type==='cta'),
      duration:totalDur>=d.minDur&&totalDur<=d.maxDur,
      startsProd:timeline.length>0&&['product','process','hook'].includes(timeline[0].type),
      startsHook:timeline.length>0&&timeline[0].type==='hook',
    };
    const reqs=d.reqs.map(r=>({...r,passed:checks[r.check]}));
    const passed=reqs.filter(r=>r.passed).length;
    const score=Math.round(passed/reqs.length*100);
    setResult({score,reqs,checks});
    const money=Math.round(task.reward.money*(score/100));
    const xp=Math.round(task.reward.xp*(score/100));
    notify(`Видео сдано! Оценка ${score}% · +${fmtMoney(money)} · +${xp} XP`,score>=75?'success':'info','🎬');
    setTimeout(()=>onComplete(task,score/100),1500);
  };

  const previewClip=preview&&timeline[previewIdx];

  if(result){
    return(
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:40,gap:24}} className="fade-in">
        <div style={{fontSize:64}}>{result.score>=80?'🏆':result.score>=60?'👍':'📝'}</div>
        <div style={{fontSize:28,fontWeight:800,color:'#fff'}}>Оценка монтажа: {result.score}%</div>
        <div style={{display:'flex',flexDirection:'column',gap:8,width:'min(400px,90vw)'}}>
          {result.reqs.map(r=>(
            <div key={r.id} style={{display:'flex',align:'center',gap:10,padding:'10px 14px',borderRadius:10,
              background:r.passed?'rgba(16,185,129,.1)':'rgba(220,38,38,.1)',
              border:`1px solid ${r.passed?'rgba(16,185,129,.25)':'rgba(220,38,38,.25)'}`}}>
              <span style={{fontSize:18}}>{r.passed?'✅':'❌'}</span>
              <span style={{color:r.passed?'#6ee7b7':'#fca5a5',fontSize:13,fontWeight:500}}>{r.text}</span>
            </div>
          ))}
        </div>
        <div style={{color:'#64748b',fontSize:13,textAlign:'center',maxWidth:400}}>
          {result.score>=80?'Отличная работа! Клиент доволен.':result.score>=60?'Хорошо, но есть что улучшить.':'Нужно доработать — перечитай требования.'}
        </div>
      </div>
    );
  }

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* Header */}
      <div style={{padding:'12px 20px',borderBottom:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:28}}>🎬</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,color:'#fff',fontSize:15}}>{task.title}</div>
          <div style={{fontSize:12,color:'#64748b'}}>{task.data.brief}</div>
        </div>
        <div className="card" style={{padding:'8px 14px',fontSize:12,display:'flex',gap:12}}>
          {task.data.reqs.map(r=>(
            <span key={r.id} style={{color:'#64748b'}}>📌 {r.text}</span>
          ))}
        </div>
      </div>
      <div style={{flex:1,display:'flex',gap:0,overflow:mob?'auto':'hidden'}}>
        {/* Left */}
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:mob?10:16,gap:12,overflow:mob?'visible':'hidden'}}>
          {/* Clip shelf */}
          <div className="card" style={{padding:14}}>
            <div style={{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:10,letterSpacing:.5}}>ИСХОДНЫЕ МАТЕРИАЛЫ — {mob?'нажми':'перетащи нужные клипы на таймлайн'}</div>
            <div style={{display:'grid',gridTemplateColumns:mob?'repeat(3,1fr)':'repeat(4,1fr)',gap:8}}>
              {shelf.map(c=>(
                <div key={c.id}
                  className={`clip-card${draggingId===c.id?' dragging-src':''}${!c.ok?' banned':''}`}
                  style={{background:c.color+'18',borderColor:(draggingId===c.id?'transparent':c.ok?c.color+'35':'#dc262640'),cursor:'pointer'}}
                  draggable onDragStart={e=>startDragShelf(e,c)}
                  onClick={()=>{if(mob){setTimeline(t=>[...t,c]);setShelf(s=>s.filter(x=>x.id!==c.id));}}}>

                  <div style={{fontSize:28,marginBottom:4}}>{c.emoji}</div>
                  <div style={{fontSize:11,fontWeight:700,color:c.ok?'#e2e8f0':'#fca5a5',lineHeight:1.3}}>{c.label}</div>
                  <div style={{fontSize:10,color:'#64748b',marginTop:3}}>{c.dur}с {!c.ok&&'⚠️'}</div>
                </div>
              ))}
              {shelf.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',color:'#374151',padding:'12px 0',fontSize:13}}>Все клипы на таймлайне</div>}
            </div>
          </div>
          {/* Timeline */}
          <div className="card" style={{padding:14,flex:1}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:.5}}>МОНТАЖНЫЙ СТОЛ (перетащи сюда)</div>
              <div style={{fontSize:12,fontWeight:700,
                color:totalDur===0?'#374151':totalDur>=task.data.minDur&&totalDur<=task.data.maxDur?'#34d399':'#f87171'}}>
                ⏱ {totalDur}с / {task.data.minDur}-{task.data.maxDur}с
              </div>
            </div>
            <div
              className={`timeline-drop${dropping?' over':''}`}
              onDragOver={e=>{e.preventDefault();setDropping(true);}}
              onDragLeave={()=>setDropping(false)}
              onDrop={onDropTl}
              style={{minHeight:80}}>
              {timeline.length===0&&(
                <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#374151',fontSize:13,pointerEvents:'none'}}>
                  ← Перетащи клипы сюда в нужном порядке
                </div>
              )}
              {timeline.map((c,i)=>(
                <div key={c.id}
                  className={`tl-clip${selId===c.id?' sel-clip':''}`}
                  style={{background:c.ok?c.color+'25':'#dc262625',border:`1px solid ${c.ok?c.color+'50':'#dc262660'}`,
                    minWidth:c.dur*14+32,maxWidth:c.dur*18+48,cursor:'pointer'}}
                  draggable
                  onDragStart={e=>startDragTl(e,c)}
                  onClick={()=>setSelId(selId===c.id?null:c.id)}>
                  <span style={{fontSize:16}}>{c.emoji}</span>
                  <span style={{color:'#e2e8f0',fontSize:10,lineHeight:1.2,textAlign:'center'}}>{c.label}</span>
                  <span style={{color:'#64748b',fontSize:10}}>{c.dur}с</span>
                </div>
              ))}
            </div>
            {selId&&(
              <button className="btn btn-danger" style={{marginTop:8,fontSize:12,padding:'6px 12px'}} onClick={()=>removeFromTl(selId)}>
                🗑 Удалить выбранный клип
              </button>
            )}
          </div>
          {/* Actions */}
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-secondary" style={{flex:1}} onClick={startPreview} disabled={timeline.length===0||preview}>
              {preview?'⏹ Стоп':'▶ Предпросмотр'}
            </button>
            <button className="btn btn-primary" style={{flex:1}} onClick={evaluate} disabled={timeline.length===0}>
              📤 Сдать работу клиенту
            </button>
          </div>
        </div>
        {/* Right: monitor */}
        {!mob&&<div style={{width:260,padding:16,display:'flex',flexDirection:'column',gap:12,borderLeft:'1px solid rgba(255,255,255,.07)'}}>
          <div className="monitor" style={{flex:1}}>
            {previewClip?(
              <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:previewClip.color+'30',transition:'all .3s'}}>
                <div style={{fontSize:56,marginBottom:8}} className="float-anim">{previewClip.emoji}</div>
                <div style={{fontSize:13,fontWeight:700,color:'#fff',textAlign:'center',padding:'0 12px'}}>{previewClip.label}</div>
                <div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>{previewClip.dur} сек</div>
                {title&&<div style={{position:'absolute',bottom:12,left:0,right:0,textAlign:'center'}}>
                  <span style={{background:'rgba(0,0,0,.8)',color:'#fff',padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:700}}>{title}</span>
                </div>}
              </div>
            ):(
              <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                <div style={{fontSize:40,marginBottom:8}}>🎬</div>
                <div style={{fontSize:12,color:'#4b5563',textAlign:'center'}}>Нажми ▶ для предпросмотра</div>
              </div>
            )}
          </div>
          <div className="card" style={{padding:12}}>
            <div style={{fontSize:11,color:'#64748b',marginBottom:6}}>ТЕКСТ / ЗАГОЛОВОК</div>
            <input className="game-input" style={{fontSize:12}} placeholder="Например: Кофейня «Арома»..." value={title} onChange={e=>setTitle(e.target.value)}/>
          </div>
          <div className="card" style={{padding:12}}>
            <div style={{fontSize:11,color:'#64748b',marginBottom:8}}>ПОРЯДОК ({timeline.length} клипов)</div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {timeline.map((c,i)=>(
                <div key={c.id} style={{display:'flex',alignItems:'center',gap:6,fontSize:11}}>
                  <span style={{color:'#374151',width:14,textAlign:'right'}}>{i+1}.</span>
                  <span>{c.emoji}</span>
                  <span style={{color:c.ok?'#cbd5e1':'#fca5a5',flex:1,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{c.label}</span>
                  <span style={{color:'#374151'}}>{c.dur}с</span>
                </div>
              ))}
              {timeline.length===0&&<div style={{color:'#374151',fontSize:11}}>Пусто</div>}
            </div>
          </div>
        </div>}
      </div>
    </div>
  );
};

// ─── ANALYTICS ───────────────────────────────────────────────────
const AnalyticsScreen=({task,onComplete,onBack})=>{
  const d=task.data;
  const [phase,setPhase]=useState('read'); // read → q1 → q2 → q3 → done
  const [selMetrics,setSelMetrics]=useState([]);
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState(0);
  const [showResult,setShowResult]=useState(false);
  const notify=useNotif();

  const toggleMetric=(id)=>{
    setSelMetrics(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id].slice(0,2));
  };

  const BarChart=({metrics})=>{
    const vals=metrics.map(m=>{const n=parseFloat(m.val.replace(/[^\d.-]/g,''));return isNaN(n)?0:Math.abs(n);});
    const max=Math.max(...vals,1);
    return(
      <svg width="100%" height="120" viewBox={`0 0 ${metrics.length*60} 120`} preserveAspectRatio="none">
        {metrics.map((m,i)=>{
          const h=Math.round((vals[i]/max)*90);
          const x=i*60+10;
          const color=m.status==='critical'?'#ef4444':m.status==='problem'?'#f97316':m.status==='good'?'#10b981':'#7c3aed';
          return(
            <g key={m.id}>
              <rect x={x} y={110-h} width={40} height={h} rx="4" fill={color} fillOpacity=".7" style={{transformOrigin:`${x+20}px 110px`,animation:'chartBars .6s ease both',animationDelay:i*.1+'s'}}/>
              <text x={x+20} y={115} textAnchor="middle" fill="#64748b" fontSize="9">{m.label.slice(0,8)}</text>
              <text x={x+20} y={105-h} textAnchor="middle" fill="#e2e8f0" fontSize="9" fontWeight="bold">{m.chg>0?'+':''}{m.chg.toFixed(0)}%</text>
            </g>
          );
        })}
      </svg>
    );
  };

  const submitQ1=()=>{
    const q=d.questions[0];
    const correct=q.correctIds.sort().join(',')===selMetrics.sort().join(',');
    if(correct){setScore(s=>s+35);notify('Правильно! Отличный анализ ✅','success','📊');}
    else{notify('Не совсем — подсказка: ищи красные метрики!','info','📊');}
    setAnswers(a=>({...a,q1:{sel:selMetrics,correct}}));
    setPhase('q2');
  };

  const submitQ23=(qid,idx)=>{
    const qi=qid==='q2'?1:2;
    const q=d.questions[qi];
    const correct=q.opts[idx].correct;
    if(correct){setScore(s=>s+(qi===1?35:30));notify('Правильно! ✅','success','💡');}
    else{notify('Неверно — подумай ещё раз ⚠️','info','💡');}
    setAnswers(a=>({...a,[qid]:{idx,correct}}));
    if(qid==='q2')setPhase('q3');
    else{
      setPhase('done');setShowResult(true);
      setTimeout(()=>{
        const finalScore=score+(correct?30:0);
        notify(`Анализ завершён! Оценка: ${Math.round((finalScore+35)/100*100)}% · +${task.reward.xp} XP`,'success','📊');
        onComplete(task,(finalScore+35)/100);
      },1500);
    }
  };

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'12px 20px',borderBottom:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:28}}>📊</span>
        <div>
          <div style={{fontWeight:700,color:'#fff',fontSize:15}}>{task.title}</div>
          <div style={{fontSize:12,color:'#64748b'}}>{d.client} · {d.period}</div>
        </div>
      </div>
      <div className="scroll-y" style={{flex:1,padding:'20px',display:'flex',gap:20}}>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:16}}>
          {/* Metrics grid */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {d.metrics.map(m=>(
              <div key={m.id}

// ─── CALENDAR ────────────────────────────────────────────────────
const CalendarScreen=({task,onComplete,onBack})=>{
  const d=task.data;
  const [pool,setPool]=useState([...d.posts]);
  const [schedule,setSchedule]=useState(d.days.map(()=>[]));
  const [selPost,setSelPost]=useState(null);
  const [overDay,setOverDay]=useState(null);
  const [dragPost,setDragPost]=useState(null);
  const [submitted,setSubmitted]=useState(false);
  const notify=useNotif();

  const onDragStartPool=(e,post)=>{setDragPost({post,src:'pool'});e.dataTransfer.effectAllowed='move';};
  const onDragStartSchedule=(e,post,dayIdx)=>{setDragPost({post,src:'schedule',dayIdx});e.dataTransfer.effectAllowed='move';};

  const onDropDay=(e,dayIdx)=>{
    e.preventDefault();setOverDay(null);
    if(!dragPost)return;
    const cur=schedule[dayIdx];
    if(cur.length>=2){notify('Не более 2 постов в день!','info','📅');setDragPost(null);return;}
    if(dragPost.src==='pool'){
      setPool(p=>p.filter(x=>x.id!==dragPost.post.id));
      setSchedule(s=>{const ns=[...s];ns[dayIdx]=[...ns[dayIdx],dragPost.post];return ns;});
    } else if(dragPost.src==='schedule'&&dragPost.dayIdx!==dayIdx){
      setSchedule(s=>{const ns=[...s];ns[dragPost.dayIdx]=ns[dragPost.dayIdx].filter(x=>x.id!==dragPost.post.id);ns[dayIdx]=[...ns[dayIdx],dragPost.post];return ns;});
    }
    setDragPost(null);
  };

  const removePost=(post,dayIdx)=>{
    setSchedule(s=>{const ns=[...s];ns[dayIdx]=ns[dayIdx].filter(x=>x.id!==post.id);return ns;});
    setPool(p=>[...p,post]);
  };

  const evaluate=()=>{
    const filled=schedule.flat().length;
    const score=Math.round(filled/d.posts.length*100);
    setSubmitted(true);
    notify(`Контент-план готов! ${filled}/${d.posts.length} постов расставлено · +${task.reward.xp} XP`,'success','📅');
    setTimeout(()=>onComplete(task,score/100),1500);
  };

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'12px 20px',borderBottom:'1px solid rgba(255,255,255,.07)',display:'flex',gap:12,alignItems:'center'}}>
        <span style={{fontSize:28}}>📅</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,color:'#fff',fontSize:15}}>{task.title}</div>
          <div style={{fontSize:12,color:'#64748b'}}>Перетащи посты в нужные дни недели</div>
        </div>
        <button className="btn btn-primary" onClick={evaluate} disabled={submitted||pool.length===d.posts.length}>
          📤 Утвердить план
        </button>
      </div>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {/* Pool */}
        <div style={{width:220,borderRight:'1px solid rgba(255,255,255,.07)',padding:14,display:'flex',flexDirection:'column',gap:8}}>
          <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:.5}}>ПОСТЫ ({pool.length})</div>
          <div style={{fontSize:11,color:'#374151',marginBottom:4}}>Перетащи в нужный день →</div>
          {pool.map(p=>(
            <div key={p.id}
              className="cal-post"
              style={{background:p.color+'20',borderColor:p.color+'40',color:'#e2e8f0'}}
              draggable onDragStart={e=>onDragStartPool(e,p)}>
              <div style={{display:'flex',align:'center',gap:6}}>
                <span>{p.emoji}</span>
                <span style={{fontSize:11,fontWeight:600}}>{p.label}</span>
              </div>
              <div style={{fontSize:10,color:'#64748b',marginTop:2}}>{p.type} · {p.bestTime}</div>
            </div>
          ))}
          {pool.length===0&&<div style={{color:'#374151',fontSize:12,textAlign:'center',paddingTop:20}}>Все посты расставлены ✅</div>}
          <div style={{marginTop:'auto',background:'rgba(255,255,255,.03)',borderRadius:10,padding:10}}>
            <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:6}}>📌 ПРАВИЛА</div>
            {d.rules.map((r,i)=><div key={i} style={{fontSize:10,color:'#4b5563',marginBottom:3}}>• {r}</div>)}
          </div>
        </div>
        {/* Calendar grid */}
        <div className="scroll-y" style={{flex:1,padding:14}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:8}}>
            {d.days.map((day,i)=>(
              <div key={day}>
                <div style={{fontSize:12,fontWeight:700,color:'#64748b',textAlign:'center',marginBottom:6,padding:'4px 0'}}>{day}</div>
                <div
                  className={`cal-day${overDay===i?' over':''}`}
                  onDragOver={e=>{e.preventDefault();setOverDay(i);}}
                  onDragLeave={()=>setOverDay(null)}
                  onDrop={e=>onDropDay(e,i)}>
                  {schedule[i].map(p=>(
                    <div key={p.id}
                      className="cal-post"
                      style={{background:p.color+'25',borderColor:p.color+'40',color:'#e2e8f0'}}
                      draggable onDragStart={e=>onDragStartSchedule(e,p,i)}
                      onDoubleClick={()=>removePost(p,i)}>
                      <div style={{display:'flex',align:'center',gap:4}}>
                        <span style={{fontSize:12}}>{p.emoji}</span>
                        <span style={{fontSize:10,fontWeight:600,lineHeight:1.2}}>{p.label}</span>
                      </div>
                    </div>
                  ))}
                  {schedule[i].length===0&&(
                    <div style={{height:50,display:'flex',alignItems:'center',justifyContent:'center',color:'#1f2937',fontSize:10}}>пусто</div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── WRITE TASK ───────────────────────────────────────────────────
const WriteTask=({task,onComplete,onBack,onFlag})=>{
  const mob=useIsMobile();
  const d=task.data;
  const [text,setText]=useState('');
  const [checking,setChecking]=useState(false);
  const [result,setResult]=useState(null);
  const [showExample,setShowExample]=useState(false);
  const notify=useNotif();

  const wordCount=text.trim().split(/\s+/).filter(Boolean).length;
  const charCount=text.trim().length;

  const submit=()=>{
    if(charCount<d.minLength){
      notify(`Слишком коротко! Минимум ${d.minLength} символов.`,'info','✏️');return;
    }
    setChecking(true);
    setTimeout(()=>{
      const checkedRubric=evalWriteTask(text,d.rubric);
      const totalPts=checkedRubric.reduce((s,r)=>s+(r.hit?r.pts:0),0);
      const maxPts=checkedRubric.reduce((s,r)=>s+r.pts,0);
      const quality=totalPts/maxPts;
      setResult({rubric:checkedRubric,totalPts,maxPts,quality});
      setChecking(false);
      if(task.consequenceFlag&&onFlag){onFlag(task.consequenceFlag,Math.round(quality*10));}
      const grade=quality>=0.8?'🔥 Отлично':quality>=0.6?'👍 Хорошо':quality>=0.4?'⚠️ Слабовато':'❌ Нужно доработать';
      notify(`${grade} · ${totalPts}/${maxPts} баллов · +${Math.round(task.reward.xp*quality)} XP`,'success','📝');
      setTimeout(()=>onComplete(task,quality),2000);
    },1800);
  };

  return(
    <div style={{flex:1,display:'flex',flexDirection:mob?'column':'row',overflow:mob?'auto':'hidden'}}>
      {/* Left: task + input */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:mob?'visible':'hidden'}}>
        <div style={{padding:'12px 20px',borderBottom:'1px solid rgba(255,255,255,.07)',display:'flex',gap:12,alignItems:'center',flexShrink:0}}>
          <span style={{fontSize:28}}>{task.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:'#fff',fontSize:15}}>{task.title}</div>
            <div style={{fontSize:12,color:'#64748b'}}>Пишешь сам — AI оценит по критериям</div>
          </div>
          {result&&(
            <div style={{background:result.quality>=0.7?'rgba(16,185,129,.15)':'rgba(251,191,36,.15)',
              border:`1px solid ${result.quality>=0.7?'rgba(16,185,129,.3)':'rgba(251,191,36,.3)'}`,
              borderRadius:10,padding:'6px 14px',textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:800,color:result.quality>=0.7?'#34d399':'#fbbf24'}}>{result.totalPts}/{result.maxPts}</div>
              <div style={{fontSize:10,color:'#64748b'}}>баллов</div>
            </div>
          )}
        </div>

        <div className="scroll-y" style={{flex:1,padding:20,display:'flex',flexDirection:'column',gap:14}}>
          {/* Brief */}
          <div className="card" style={{padding:14}}>
            <div style={{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:6}}>БРИФ КЛИЕНТА</div>
            <div style={{fontSize:13,color:'#e2e8f0',lineHeight:1.6,background:'rgba(251,191,36,.04)',border:'1px solid rgba(251,191,36,.12)',borderRadius:8,padding:10}}>
              {d.brief}
            </div>
          </div>
          {/* Task */}
          <div className="card" style={{padding:14,borderColor:'rgba(124,58,237,.2)'}}>
            <div style={{fontSize:11,fontWeight:700,color:'#a78bfa',marginBottom:6}}>📋 ТВОЁ ЗАДАНИЕ</div>
            <div style={{fontSize:13,color:'#e2e8f0',lineHeight:1.6}}>{d.task}</div>
          </div>
          {/* Textarea */}
          {!result&&(
            <div>
              <textarea
                className="game-textarea"
                style={{minHeight:220,resize:'vertical',fontSize:13,lineHeight:1.7}}
                placeholder="Пиши здесь... Используй профессиональные термины, структурируй текст."
                value={text}
                onChange={e=>setText(e.target.value)}
                disabled={checking}
              />
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
                <div style={{fontSize:11,color:charCount>=d.minLength?'#34d399':'#64748b'}}>
                  {charCount} / {d.minLength} символов (минимум) · {wordCount} слов
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-secondary" style={{fontSize:12}} onClick={()=>setShowExample(!showExample)}>
                    {showExample?'Скрыть пример':'💡 Пример'}
                  </button>
                  <button className="btn btn-primary" onClick={submit} disabled={checking||charCount<d.minLength}>
                    {checking?<><span className="spin-anim" style={{display:'inline-block'}}>⚙️</span> Анализирую...</>:'📤 Сдать на оценку'}
                  </button>
                </div>
              </div>
            </div>
          )}
          {result&&(
            <div className="pop-in" style={{textAlign:'center',padding:16,background:'rgba(16,185,129,.06)',border:'1px solid rgba(16,185,129,.2)',borderRadius:12}}>
              <div style={{fontSize:32,marginBottom:6}}>{result.quality>=0.8?'🔥':result.quality>=0.6?'👍':'⚠️'}</div>
              <div style={{fontWeight:700,color:result.quality>=0.7?'#34d399':'#fbbf24',fontSize:15}}>
                {result.quality>=0.8?'Отличная работа!':result.quality>=0.6?'Хорошая работа!':'Можно лучше'}
              </div>
              <div style={{color:'#64748b',fontSize:12,marginTop:4}}>{result.totalPts}/{result.maxPts} баллов · {Math.round(result.quality*100)}%</div>
            </div>
          )}
          {showExample&&!result&&(
            <div className="card slide-up" style={{padding:14,borderColor:'rgba(251,191,36,.2)'}}>
              <div style={{fontSize:11,fontWeight:700,color:'#fbbf24',marginBottom:8}}>💡 Пример хорошего ответа</div>
              <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{d.exampleAnswer}</div>
            </div>
          )}
        </div>
      </div>

      {/* Right: rubric */}
      <div style={{
        width:mob?'100%':300,
        borderLeft:mob?'none':'1px solid rgba(255,255,255,.07)',
        borderTop:mob?'1px solid rgba(255,255,255,.07)':'none',
        display:'flex',flexDirection:'column',flexShrink:0
      }}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,.07)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'#fff'}}>📊 Критерии оценки</div>
          <div style={{fontSize:11,color:'#4b5563',marginTop:2}}>AI проверяет каждый пункт</div>
        </div>
        <div className="scroll-y" style={{flex:1,padding:14,display:'flex',flexDirection:'column',gap:10}}>
          {d.rubric.map(r=>{
            const hit=result?result.rubric.find(x=>x.id===r.id)?.hit:null;
            return(
              <div key={r.id} className="card" style={{padding:12,
                borderColor:hit===true?'rgba(16,185,129,.3)':hit===false?'rgba(220,38,38,.25)':'rgba(255,255,255,.08)',
                background:hit===true?'rgba(16,185,129,.05)':hit===false?'rgba(220,38,38,.04)':'rgba(255,255,255,.02)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:700,color:hit===true?'#34d399':hit===false?'#f87171':'#fff'}}>{r.label}</span>
                  <span style={{fontSize:12,fontWeight:800,color:'#a78bfa'}}>{r.pts} бал</span>
                </div>
                {hit!==null&&(
                  <div style={{fontSize:11,fontWeight:700,color:hit?'#34d399':'#f87171',marginBottom:4}}>
                    {hit?'✅ Есть':'❌ Не найдено'}
                  </div>
                )}
                <div style={{fontSize:11,color:'#4b5563',lineHeight:1.4}}>{r.tip}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ─── TASK LAUNCHER ───────────────────────────────────────────────
const TaskLauncher=({task,gs,onComplete,onBack,onFlag})=>{
  if(task.type==='chat')return<ChatScreen tasks={[task]} onComplete={onComplete} onBack={onBack} onFlag={onFlag}/>;
  if(task.type==='write')return<WriteTask task={task} onComplete={onComplete} onBack={onBack} onFlag={onFlag}/>;
  if(task.type==='video_edit')return<VideoEditor task={task} onComplete={onComplete} onBack={onBack}/>;
  if(task.type==='analytics')return<AnalyticsScreen task={task} onComplete={onComplete} onBack={onBack}/>;
  if(task.type==='ai_content')return<AIStudioScreen task={task} onComplete={onComplete} onBack={onBack}/>;
  if(task.type==='calendar')return<CalendarScreen task={task} onComplete={onComplete} onBack={onBack}/>;
  return<div style={{padding:40,color:'#64748b'}}>Неизвестный тип задачи</div>;
};

// ─── ZONE SCREEN (pick task) ─────────────────────────────────────
const ZoneScreen=({zoneId,tasks,onStartTask,onBack})=>{
  const zone=ZONES.find(z=>z.id===zoneId);
  const zoneTasks=tasks.filter(t=>{
    if(zoneId==='video_edit')return t.type==='video_edit';
    if(zoneId==='ai_content')return t.type==='ai_content';
    return t.type===zoneId;
  });
  return(
    <div style={{flex:1,padding:24,overflow:'auto'}} className="scroll-y">
      <button onClick={onBack} className="btn btn-secondary" style={{marginBottom:20,padding:'7px 14px',fontSize:13}}>← Назад</button>
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:20}}>
        <span style={{fontSize:40}}>{zone?.icon}</span>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,color:'#fff'}}>{zone?.label}</h2>
          <p style={{color:'#64748b',fontSize:14}}>{zone?.desc}</p>
        </div>
      </div>
      {zoneTasks.length===0?(
        <div style={{textAlign:'center',padding:'60px 20px',color:'#374151'}}>
          <div style={{fontSize:40,marginBottom:12}}>✅</div>
          <div style={{fontSize:16}}>Нет активных задач в этой зоне</div>
          <div style={{fontSize:13,marginTop:8}}>Отличная работа! Проверь другие зоны.</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {zoneTasks.map(t=>{
            const client=CLIENTS.find(c=>c.id===t.clientId);
            return(
              <div key={t.id} className="card slide-up" style={{padding:20}}>
                <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
                  <span style={{fontSize:36}}>{t.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:16,fontWeight:700,color:'#fff',marginBottom:4}}>{t.title}</div>
                    <div style={{fontSize:13,color:'#64748b',marginBottom:12}}>{t.desc}</div>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      <span style={{background:'rgba(251,191,36,.12)',color:'#fbbf24',borderRadius:8,padding:'3px 10px',fontSize:12,fontWeight:700,border:'1px solid rgba(251,191,36,.2)'}}>💰 {fmtMoney(t.reward.money)}</span>
                      <span style={{background:'rgba(124,58,237,.12)',color:'#a78bfa',borderRadius:8,padding:'3px 10px',fontSize:12,fontWeight:700,border:'1px solid rgba(124,58,237,.2)'}}>⚡ +{t.reward.xp} XP</span>
                      <span style={{background:'rgba(244,114,182,.12)',color:'#f472b6',borderRadius:8,padding:'3px 10px',fontSize:12,fontWeight:700,border:'1px solid rgba(244,114,182,.2)'}}>⭐ +{t.reward.rep}</span>
                      {client&&<span style={{background:'rgba(255,255,255,.06)',color:'#94a3b8',borderRadius:8,padding:'3px 10px',fontSize:12}}>{client.emoji} {client.name} · {client.company}</span>}
                    </div>
                  </div>
                  <button className="btn btn-primary" onClick={()=>onStartTask(t)}>Начать →</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// Grade thresholds
const getGrade=(pct)=>{
  if(pct>=90)return{label:'A+',title:'Мастер',color:'#fbbf24',emoji:'🏆',desc:'Блестящий результат! Ты готов к реальным клиентам.'};
  if(pct>=80)return{label:'A',title:'Эксперт',color:'#34d399',emoji:'🥇',desc:'Отличная работа. Уверенно начинай с реальными клиентами.'};
  if(pct>=70)return{label:'B',title:'Специалист',color:'#60a5fa',emoji:'🥈',desc:'Хороший уровень. Ещё немного практики — и вперёд!'};
  if(pct>=55)return{label:'C',title:'Стажёр',color:'#a78bfa',emoji:'🥉',desc:'Базу знаешь, но нужно повторить стратегию и общение с клиентами.'};
  return{label:'D',title:'Новичок',color:'#f87171',emoji:'📚',desc:'Пройди курс ещё раз перед работой с реальными клиентами.'};
};

// ─── EXAM SCREEN ─────────────────────────────────────────────────
const ExamScreen=({gs,onFinish,onBack})=>{
  const mob=useIsMobile();
  const [step,setStep]=useState(0); // 0=intro, 1-4=tasks, 5=results
  const [scores,setScores]=useState([]); // [{step, quality, label}]
  const [showCert,setShowCert]=useState(false);
  const [currentTaskKey,setCurrentTaskKey]=useState(0);
  const notify=useNotif();

  const task=EXAM_TASKS[step-1];

  const handleTaskComplete=(quality)=>{
    const t=EXAM_TASKS[step-1];
    const newScore={step,quality,label:t.title,icon:t.icon};
    const newScores=[...scores,newScore];
    setScores(newScores);
    if(step<EXAM_TASKS.length){
      setStep(step+1);
      setCurrentTaskKey(k=>k+1);
      notify(`Задание ${step} выполнено! ${Math.round(quality*100)}% · Следующее задание...`,'success',t.icon);
    } else {
      setStep(5); // results
    }
  };

  // Wrap task data into the format expected by existing components
  const buildTask=(et)=>{
    if(et.type==='chat'){
      return{id:'exam-chat',type:'chat',clientId:'elena',
        data:{scenes:et.scenes},
        reward:{money:0,xp:0,rep:0},title:et.title
      };
    }
    if(et.type==='write'){
      return{id:`exam-write-${et.step}`,type:'write',clientId:'elena',
        data:{brief:et.brief,task:et.task,minLength:et.minLength,rubric:et.rubric,exampleAnswer:et.exampleAnswer},
        reward:{money:0,xp:0,rep:0},title:et.title,icon:et.icon
      };
    }
    if(et.type==='video_edit'){
      return{id:'exam-video',type:'video_edit',clientId:'elena',
        data:{brief:et.brief,clips:et.clips,reqs:et.reqs,minDur:et.minDur,maxDur:et.maxDur},
        reward:{money:0,xp:0,rep:0},title:et.title
      };
    }
  };

  // Results
  if(step===5){
    const avgQuality=scores.reduce((s,x)=>s+x.quality,0)/scores.length;
    const pct=Math.round(avgQuality*100);
    const grade=getGrade(pct);
    const skillScores=[
      {label:'Переговоры',icon:'💬',score:Math.round((scores[0]?.quality||0)*10)},
      {label:'Стратегия',icon:'📝',score:Math.round((scores[1]?.quality||0)*10)},
      {label:'Контент-план',icon:'📋',score:Math.round((scores[2]?.quality||0)*10)},
      {label:'Монтаж',icon:'🎬',score:Math.round((scores[3]?.quality||0)*10)},
      {label:'Экспертность',icon:'🎓',score:Math.min(10,Math.round(avgQuality*12))},
      {label:'Готовность к работе',icon:'🚀',score:pct>=70?8:pct>=55?6:4},
    ];
    const today=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'});
    return(
      <div style={{flex:1,overflow:'auto',padding:mob?16:32,display:'flex',flexDirection:'column',alignItems:'center',gap:24}} className="scroll-y">
        {showCert&&<Certificate playerName={gs.playerName} grade={grade} pct={pct} skillScores={skillScores} date={today} onClose={()=>setShowCert(false)}/>}
        <div className="pop-in" style={{textAlign:'center',maxWidth:700,width:'100%'}}>
          <div style={{fontSize:72,marginBottom:12,animation:'float 3s ease-in-out infinite'}}>{grade.emoji}</div>
          <h1 style={{fontSize:34,fontWeight:900,color:'#fff',marginBottom:6}}>Экзамен завершён!</h1>
          <div style={{fontSize:18,color:grade.color,fontWeight:700,marginBottom:4}}>Оценка: {grade.label} · {grade.title}</div>
          <div style={{fontSize:14,color:'#64748b',marginBottom:32}}>{grade.desc}</div>

          {/* Score breakdown */}
          <div style={{display:'grid',gridTemplateColumns:mob?'1fr':'repeat(2,1fr)',gap:12,marginBottom:28}}>
            {scores.map((s,i)=>{
              const et=EXAM_TASKS[i];
              const sc=Math.round(s.quality*100);
              return(
                <div key={i} className="card" style={{padding:16,display:'flex',alignItems:'center',gap:12}}>
                  <span style={{fontSize:32}}>{et.icon}</span>
                  <div style={{flex:1,textAlign:'left'}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:4}}>{et.title}</div>
                    <div style={{height:6,borderRadius:3,background:'rgba(255,255,255,.08)',overflow:'hidden'}}>
                      <div style={{height:'100%',borderRadius:3,width:sc+'%',
                        background:sc>=80?'#34d399':sc>=60?'#fbbf24':'#f87171',transition:'width .8s ease'}}/>
                    </div>
                    <div style={{fontSize:12,color:'#64748b',marginTop:4}}>{sc}%</div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Total */}
          <div style={{background:`rgba(124,58,237,.12)`,border:'2px solid #7c3aed',borderRadius:16,padding:'24px 40px',marginBottom:28,display:'inline-block'}}>
            <div style={{fontSize:64,fontWeight:900,color:grade.color,lineHeight:1}}>{pct}%</div>
            <div style={{fontSize:16,color:'#a78bfa',fontWeight:700,marginTop:4}}>Итоговый балл</div>
          </div>

          {/* Skills */}
          <div style={{display:'grid',gridTemplateColumns:mob?'repeat(2,1fr)':'repeat(3,1fr)',gap:10,marginBottom:28}}>
            {skillScores.map((s,i)=>(
              <div key={i} className="card" style={{padding:12,textAlign:'center'}}>
                <div style={{fontSize:24,marginBottom:4}}>{s.icon}</div>
                <div style={{fontSize:12,color:'#94a3b8',marginBottom:4}}>{s.label}</div>
                <div style={{fontSize:20,fontWeight:800,color:s.score>=7?'#34d399':s.score>=5?'#fbbf24':'#f87171'}}>{s.score}/10</div>
              </div>
            ))}
          </div>

          <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
            <button className="btn btn-primary" style={{padding:'14px 32px',fontSize:15}} onClick={()=>setShowCert(true)}>
              📜 Получить сертификат
            </button>
            <button className="btn btn-secondary" style={{padding:'14px 24px',fontSize:15}} onClick={onFinish}>
              🏠 Вернуться в офис
            </button>
          </div>
        </div>
      </div>
    );
  }

  // Intro
  if(step===0){
    return(
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:mob?16:40,overflow:'auto',background:'radial-gradient(ellipse at 50% 30%,rgba(124,58,237,.15) 0%,transparent 60%)'}}>
        <div className="pop-in" style={{textAlign:'center',maxWidth:600}}>
          <div style={{fontSize:64,marginBottom:16}} className="float-anim">🎓</div>
          <h1 style={{fontSize:32,fontWeight:900,color:'#fff',marginBottom:8}}>Финальный экзамен</h1>
          <p style={{color:'#64748b',fontSize:15,marginBottom:8}}>Новый клиент — реальная задача</p>

          <div className="card" style={{padding:20,margin:'20px 0',textAlign:'left',borderColor:'rgba(251,191,36,.2)'}}>
            <div style={{display:'flex',gap:14,alignItems:'center',marginBottom:14}}>
              <span style={{fontSize:40}}>{EXAM_CLIENT.emoji}</span>
              <div>
                <div style={{fontSize:18,fontWeight:700,color:'#fff'}}>{EXAM_CLIENT.name}</div>
                <div style={{fontSize:14,color:'#fbbf24'}}>{EXAM_CLIENT.company}</div>
                <div style={{fontSize:12,color:'#64748b'}}>{EXAM_CLIENT.niche}</div>
              </div>
            </div>
            <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.6}}>
              Елена только открыла пекарню в центре города. У неё красивое заведение и вкусная выпечка, но о ней никто не знает. Она пришла к тебе за помощью.
            </div>
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:28,textAlign:'left'}}>
            {EXAM_TASKS.map((t,i)=>(
              <div key={i} style={{display:'flex',gap:10,alignItems:'center',padding:'10px 14px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:10}}>
                <span style={{fontSize:20}}>{t.icon}</span>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:'#fff'}}>Задание {i+1}: {t.title}</div>
                  <div style={{fontSize:11,color:'#4b5563'}}>{t.desc}</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{display:'flex',gap:12,justifyContent:'center'}}>
            <button className="btn btn-primary" style={{padding:'14px 36px',fontSize:15}} onClick={()=>setStep(1)}>
              🚀 Начать экзамен
            </button>
            <button className="btn btn-secondary" style={{padding:'14px 20px',fontSize:13}} onClick={onBack}>
              Назад
            </button>
          </div>
        </div>
      </div>
    );
  }

  // Active task (steps 1-4)
  const et=EXAM_TASKS[step-1];
  const builtTask=buildTask(et);

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* Exam progress bar */}
      <div style={{padding:'8px 20px',borderBottom:'1px solid rgba(124,58,237,.2)',background:'rgba(124,58,237,.06)',flexShrink:0,display:'flex',alignItems:'center',gap:16}}>
        <span style={{fontSize:12,fontWeight:700,color:'#a78bfa',flexShrink:0}}>🎓 ЭКЗАМЕН</span>
        <div style={{flex:1,display:'flex',gap:4}}>
          {EXAM_TASKS.map((t,i)=>(
            <div key={i} style={{flex:1,height:6,borderRadius:3,
              background:i<step-1?'#7c3aed':i===step-1?'rgba(124,58,237,.5)':'rgba(255,255,255,.07)'}}>
            </div>
          ))}
        </div>
        <span style={{fontSize:12,color:'#64748b',flexShrink:0}}>Задание {step}/{EXAM_TASKS.length}</span>
      </div>
      {/* Task content */}
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {et.type==='chat'&&(
          <ChatScreen key={currentTaskKey}
            tasks={[{...builtTask,clientId:'elena'}]}
            onComplete={(_,q)=>handleTaskComplete(q)}
            onBack={()=>{}}
            onFlag={()=>{}}
            examClients={[EXAM_CLIENT]}
          />
        )}
        {et.type==='write'&&(
          <WriteTask key={currentTaskKey}
            task={builtTask}
            onComplete={(_,q)=>handleTaskComplete(q)}
            onBack={()=>{}}
            onFlag={()=>{}}
          />
        )}
        {et.type==='video_edit'&&(
          <VideoEditor key={currentTaskKey}
            task={builtTask}
            onComplete={(_,q)=>handleTaskComplete(q)}
            onBack={()=>{}}
          />
        )}
      </div>
    </div>
  );
};

  dmitry_budget_chat:(score)=>score>=7
    ?{type:'good',icon:'🤝',from:'Дмитрий',msg:`Дмитрий: «Отличный разговор! Готов подписать договор на 3 месяца».`}
    :{type:'warn',icon:'🤔',from:'Дмитрий',msg:`Дмитрий: «Подумаем... Смотрим ещё пару агентств». Сделка под угрозой.`},
  alina_reels_quality:(score)=>score>=7
    ?{type:'good',icon:'💫',from:'Алина',msg:`Алина: «Обожаю эти идеи! Можно сразу в работу. Порекомендую тебя подруге» — скоро придёт новый клиент!`}
    :{type:'warn',icon:'😐',from:'Алина',msg:`Алина: «Идеи немного шаблонные... Ожидала более творческого подхода».`},
};

// ─── MAIN APP ────────────────────────────────────────────────────
const App=()=>{
  const [started,setStarted]=useState(false);
  const [gs,setGs]=useState(loadState);
  const [screen,setScreen]=useState('office');
  const [zoneId,setZoneId]=useState(null);
  const [activeTask,setActiveTask]=useState(null);
  const [completedIds,setCompletedIds]=useState(new Set(gs.completedTasks||[]));
  const [consequences,setConsequences]=useState([]); // [{id, consequence, seen}]

  useEffect(()=>saveState(gs),[gs]);

  const availTasks=ALL_TASKS.filter(t=>!completedIds.has(t.id));
  const completedTasks=ALL_TASKS.filter(t=>completedIds.has(t.id));

  const nav=(s)=>{setScreen(s);setActiveTask(null);};

  const openZone=(id)=>{
    if(id==='shop'){setScreen('shop');return;}
    if(id==='exam'){setScreen('exam');return;}
    setZoneId(id);setScreen('zone');
  };

  const startTask=(t)=>{setActiveTask(t);setScreen('task');};

  // Called by tasks that have consequenceFlag
  const handleFlag=(flag,score)=>{
    const gen=CONSEQUENCES[flag];
    if(!gen)return;
    const consequence=gen(score);
    // Show after a delay (simulate "next day" effect)
    setTimeout(()=>{
      setConsequences(prev=>[...prev,{id:Date.now(),consequence,score}]);
    },3000);
    setGs(g=>({...g,flags:{...(g.flags||{}), [flag]:score}}));
  };

  const dismissConsequence=(id)=>{
    setConsequences(prev=>prev.filter(c=>c.id!==id));
  };

  const completeTask=(t,quality=1)=>{
    const money=Math.round(t.reward.money*quality);
    const xp=Math.round(t.reward.xp*quality);
    const rep=Math.round(t.reward.rep*(quality>0.5?quality:0.3));
    setGs(g=>{
      const newXp=g.xp+xp;
      const newLevel=LEVELS.findIndex(l=>newXp<l.next)+1||LEVELS.length;
      return{...g,money:g.money+money,xp:newXp,rep:g.rep+rep,
        level:newLevel,
        day:g.day+1,
        completedTasks:[...(g.completedTasks||[]),t.id]};
    });
    setCompletedIds(s=>new Set([...s,t.id]));
    setScreen(zoneId?'zone':'tasks');
    setActiveTask(null);
  };

  if(!started){
    return(
      <NotifProvider>
        <Intro onStart={(name)=>{setGs(g=>({...g,playerName:name}));setStarted(true);}}/>
      </NotifProvider>
    );
  }

  return(
    <NotifProvider>
      <GameUI
        gs={gs} screen={screen} zoneId={zoneId}
        activeTask={activeTask} availTasks={availTasks} completedTasks={completedTasks}
        consequences={consequences}
        nav={nav} openZone={openZone} startTask={startTask}
        completeTask={completeTask} handleFlag={handleFlag}
        dismissConsequence={dismissConsequence} setGs={setGs}
      />
    </NotifProvider>
  );
};

// ─── GAME UI (inside NotifProvider so useNotif works) ─────────────
const GameUI=({gs,screen,zoneId,activeTask,availTasks,completedTasks,consequences,
  nav,openZone,startTask,completeTask,handleFlag,dismissConsequence,setGs})=>{
  const notify=useNotif();
  return(
    <>
      <Hud gs={gs} screen={screen} onNav={nav}/>
      {/* Consequence popups */}
      {consequences.map(c=>(
        <div key={c.id} className="slide-up" style={{
          position:'fixed',top:70,right:20,zIndex:900,minWidth:300,maxWidth:380,
          background:c.consequence.type==='good'?'rgba(16,185,129,.12)':c.consequence.type==='bad'?'rgba(220,38,38,.12)':'rgba(251,191,36,.1)',
          border:`1px solid ${c.consequence.type==='good'?'rgba(16,185,129,.35)':c.consequence.type==='bad'?'rgba(220,38,38,.35)':'rgba(251,191,36,.3)'}`,
          borderRadius:14,padding:'14px 16px',backdropFilter:'blur(12px)',boxShadow:'0 10px 40px rgba(0,0,0,.5)',
        }}>
          <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
            <span style={{fontSize:26,flexShrink:0}}>{c.consequence.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:4}}>
                📩 {c.consequence.from} — последствие предыдущей задачи
              </div>
              <div style={{fontSize:13,color:'#e2e8f0',lineHeight:1.5}}>{c.consequence.msg}</div>
            </div>
            <button onClick={()=>dismissConsequence(c.id)} style={{background:'none',border:'none',color:'#4b5563',cursor:'pointer',fontSize:16,padding:'0 4px',flexShrink:0}}>✕</button>
          </div>
        </div>
      ))}
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {screen==='office'&&<Office gs={gs} tasks={availTasks} onNav={openZone}/>}
        {screen==='tasks'&&<TaskBoard tasks={availTasks} completedTasks={completedTasks} onStart={startTask}/>}
        {screen==='zone'&&zoneId&&(
          <ZoneScreen zoneId={zoneId} tasks={availTasks} onStartTask={startTask} onBack={()=>nav('office')}/>
        )}
        {screen==='task'&&activeTask&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{padding:'8px 16px',borderBottom:'1px solid rgba(255,255,255,.06)',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
              <button className="btn btn-secondary" style={{padding:'5px 12px',fontSize:12}} onClick={()=>nav(zoneId?'zone':'tasks')}>← Назад</button>
              <span style={{fontSize:13,color:'#64748b'}}>{activeTask.icon} {activeTask.title}</span>
              {activeTask.week&&<span style={{fontSize:11,background:'rgba(124,58,237,.15)',color:'#a78bfa',border:'1px solid rgba(124,58,237,.25)',borderRadius:6,padding:'2px 8px'}}>Неделя {activeTask.week}</span>}
            </div>
            <TaskLauncher task={activeTask} gs={gs} onComplete={completeTask} onBack={()=>nav(zoneId?'zone':'tasks')} onFlag={handleFlag}/>
          </div>
        )}
        {screen==='shop'&&<Shop gs={gs} setGs={setGs}/>}
        {screen==='exam'&&<ExamScreen gs={gs} onFinish={()=>nav('office')} onBack={()=>nav('office')}/>}
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
